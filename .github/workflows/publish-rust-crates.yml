name: Publish Rust crates to crates.io

# Trigger: push a tag like `rust-v0.15.0`
#
# One-time crates.io setup:
#   cargo login                          # on your machine
#   cargo publish -p pcapng-sys --dry-run   # (from bindings/rust/, after sync-sources.sh)
#   Add CARGO_REGISTRY_TOKEN to repo secrets → Settings → Secrets → Actions

on:
  push:
    tags: ["rust-v*"]
  workflow_dispatch:

jobs:
  publish:
    name: Publish pcapng-sys + libpcapng
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Install libclang (required by bindgen)
        run: sudo apt-get install -y libclang-dev

      - name: Vendor C sources
        run: bash bindings/rust/scripts/sync-sources.sh

      - name: Publish pcapng-sys
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        working-directory: bindings/rust
        # Idempotent: skip if this exact version is already on crates.io, so a
        # re-run of a tag (or a bump where only one crate changed) doesn't fail.
        run: |
          set -e
          VER=$(cargo metadata --no-deps --format-version 1 \
                | python3 -c "import sys,json;print(next(p['version'] for p in json.load(sys.stdin)['packages'] if p['name']=='pcapng-sys'))")
          if curl -sf "https://crates.io/api/v1/crates/pcapng-sys/$VER" >/dev/null; then
            echo "pcapng-sys $VER already published — skipping."
          else
            cargo publish -p pcapng-sys --allow-dirty
            echo "Waiting for crates.io to index pcapng-sys $VER…"
            sleep 30
          fi

      - name: Publish libpcapng
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        working-directory: bindings/rust
        run: |
          set -e
          VER=$(cargo metadata --no-deps --format-version 1 \
                | python3 -c "import sys,json;print(next(p['version'] for p in json.load(sys.stdin)['packages'] if p['name']=='libpcapng'))")
          if curl -sf "https://crates.io/api/v1/crates/libpcapng/$VER" >/dev/null; then
            echo "libpcapng $VER already published — skipping."
          else
            cargo publish -p libpcapng --allow-dirty
          fi
