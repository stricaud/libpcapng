name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.create.outputs.tag }}
    steps:
      - uses: actions/checkout@v5

      - name: Create tag and release
        id: create
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(cat VERSION)
          SHA=$(git rev-parse --short HEAD)
          TAG="v${VERSION}-${SHA}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          git tag "${TAG}" 2>/dev/null || echo "tag already exists"
          git push origin "${TAG}" 2>/dev/null || echo "tag already pushed"
          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes "Automated build from commit ${GITHUB_SHA}" \
            2>/dev/null || echo "release already exists"

  build:
    needs: tag
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest      # x86_64
          - ubuntu-24.04-arm   # aarch64
#          - macos-13           # x86_64
          - macos-14           # arm64
        python-version: ['3.11', '3.12', '3.13', '3.14']

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install pybind11
        run: pip install pybind11

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -Dpybind11_DIR=$(python3 -m pybind11 --cmakedir)

      - name: Build
        run: cmake --build build --target pycapng --parallel

      - name: Stage artifact
        shell: bash
        run: |
          SO=$(find build/bindings -name "pycapng*.so" -o -name "pycapng*.dylib" | head -1)
          cp "$SO" .
          echo "ARTIFACT=$(basename $SO)" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT }}
          path: ${{ env.ARTIFACT }}

      - name: Attach to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ needs.tag.outputs.tag }}" "${{ env.ARTIFACT }}" --repo "${{ github.repository }}" --clobber
        # (regular manylinux build)

  build-debian:
    # NOTE: the debian .so is uploaded under a distinct "-bookworm" asset name so
    # it does not collide with the manylinux py3.14 .so from the `build` job.
    # Two jobs racing to `--clobber` the same asset name causes an HTTP 404.
    needs: tag
    name: debian-bookworm-${{ matrix.arch }} / py3.14
    runs-on: ${{ matrix.runner }}
    container: ghcr.io/astral-sh/uv:python3.14-bookworm-slim
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest     # x86_64
            arch: x86_64
          - runner: ubuntu-24.04-arm  # aarch64
            arch: aarch64

    steps:
      - uses: actions/checkout@v5

      - name: Install build dependencies
        run: apt-get update -qq && apt-get install -y --no-install-recommends cmake build-essential gh

      - name: Install pybind11
        run: uv pip install --system pybind11

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -Dpybind11_DIR=$(python3 -m pybind11 --cmakedir)

      - name: Build
        run: cmake --build build --target pycapng --parallel

      - name: Stage artifact
        run: |
          SO=$(find build/bindings -name "pycapng*.so" | head -1)
          cp "$SO" .
          echo "ARTIFACT=$(basename $SO)" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT }}-debian-bookworm
          path: ${{ env.ARTIFACT }}

      - name: Attach to release
        env:
          GH_TOKEN: ${{ github.token }}
        # Upload under a distinct "-bookworm" asset name so it never collides
        # with the manylinux py3.14 .so from the `build` job (concurrent
        # --clobber of the same asset name → HTTP 404).
        run: |
          DEB="${ARTIFACT%.so}-bookworm.so"
          cp "$ARTIFACT" "$DEB"
          gh release upload "${{ needs.tag.outputs.tag }}" "$DEB" --repo "${{ github.repository }}" --clobber
